name: CI/CD Pipeline

on:
  push:
    branches: ["*"]
  pull_request:

jobs:

  
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install flake8

      - name: Run flake8
        run: flake8 api worker

      - name: Install Node deps
        run: |
          cd frontend
          npm install

      - name: Run eslint
        run: |
          cd frontend
          ./node_modules/.bin/eslint . --config .eslintrc.json

      - name: Install hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Run hadolint (non-blocking)
        run: |
          hadolint api/Dockerfile || true
          hadolint worker/Dockerfile || true
          hadolint frontend/Dockerfile || true


  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov fakeredis httpx

      - name: Run tests
        run: |
          PYTHONPATH=./api pytest api/tests --cov=api --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t api:${{ github.sha }} ./api
          docker build -t worker:${{ github.sha }} ./worker
          docker build -t frontend:${{ github.sha }} ./frontend


  
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: "api:${{ github.sha }}"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: true


 
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:8000/health; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 2
          done
          exit 1

      - name: Submit job
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r '.job_id')
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll job
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r '.status')
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down


  # =========================
  # DEPLOY (SIMULATION)
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy simulation
        run: |
          echo "Starting deployment..."
          docker compose up -d --build
          sleep 20
          docker ps