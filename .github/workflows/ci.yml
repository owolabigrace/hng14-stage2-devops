name: CI/CD Pipeline
on:
  push:
    branches: ["*"]
  pull_request:

jobs:

  
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install flake8

      - name: Run flake8
        run: flake8 api worker

      - name: Install Node deps
        run: |
          cd frontend
          npm install

      - name: Run eslint
        run: |
          cd frontend
          npm run lint

      - name: Install hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Run hadolint (non-blocking)
        run: |
          hadolint api/Dockerfile || true
          hadolint worker/Dockerfile || true
          hadolint frontend/Dockerfile || true


  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      registry:   
          image: registry:2
          ports:
            - 5000:5000

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov fakeredis

      - name: Run tests
        run: |
          PYTHONPATH= pytest api/tests -v

      - name: Run integration tests
        run: ./tests/integration.sh


      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push API image (with cache)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Rolling update simulation
        run: |
          docker compose up -d --build --scale api=2
          sleep 10
          docker compose up -d --no-deps api
          sleep 5
          docker compose ps

  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull image
        run: docker pull ghcr.io/${{ github.repository }}/api:${{ github.sha }}

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          format: sarif
          output: results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Upload SARIF
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: results.sarif
 
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Run integration script
        run: bash tests/integration.sh
        
      - name: Use secret example
        env:
          API_URL: ${{ secrets.API_URL }}
        run: echo "Using secret"
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Wait for API
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:8000/health; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 2
          done
          exit 1

      - name: Submit job
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r '.job_id')
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll job
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r '.status')
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down


  # =========================
  # DEPLOY (SIMULATION)
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Deploy simulation
        run: |
          echo "Starting deployment..."
          docker compose up -d --build
          sleep 20
          docker ps

      - name: Build and tag API image
        run: |
          docker build -t ghcr.io/your-org/api:latest \
                 -t ghcr.io/your-org/api:${{ github.sha }} ./api

      - name: Push API image
        run: |
          docker push ghcr.io/your-org/api:latest
          docker push ghcr.io/your-org/api:${{ github.sha }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (with cache + tags)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          load: true
          tags: |
            api:latest
            api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Rolling update simulation
        run: |
          docker compose up -d --scale api=2
          docker compose up -d --no-deps --force-recreate api

  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u USER --password-stdin

      - name: Pull image
        run: docker pull ghcr.io/your-org/api:${{ github.sha }}

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/your-org/api:${{ github.sha }}
          format: sarif
          output: results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Upload SARIF
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: results.sarif

 
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Run integration script
        run: bash tests/integration.sh
        
      - name: Use secret example
        env:
          API_URL: ${{ secrets.API_URL }}
        run: echo "Using secret"
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Wait for API
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:8000/health; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 2
          done
          exit 1

      - name: Submit job
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r '.job_id')
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll job
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r '.status')
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down


  # =========================
  # DEPLOY (SIMULATION)
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Deploy simulation
        run: |
          echo "Starting deployment..."
          docker compose up -d --build
          sleep 20
          docker ps