name: CI/CD Pipeline

on:
  push:
    branches: ["*"]
  pull_request:

jobs:

  lint:
   runs-on: ubuntu-latest

   steps:
    - uses: actions/checkout@v4

    - name: Install Python deps
      run: pip install flake8

    - name: Run flake8
      run: flake8 api worker

    - name: Install Node deps
      run: |
        cd frontend
        npm install

    - name: Run eslint
      run: |
        cd frontend
        npx eslint . --config .eslintrc.json

    - name: Install hadolint
      run: |
        wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
        chmod +x hadolint
        sudo mv hadolint /usr/local/bin/

    - name: Run hadolint (STRICT FIX)
      run: |
        hadolint api/Dockerfile
        hadolint worker/Dockerfile
        hadolint frontend/Dockerfile
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          pip install pytest pytest-cov fakeredis

      - name: Run tests
        run: |
          pytest api/tests --cov=api --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} ./api
          docker build -t localhost:5000/worker:${{ github.sha }} ./worker
          docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend

      - name: Tag latest
        run: |
          docker tag localhost:5000/api:${{ github.sha }} localhost:5000/api:latest
          docker tag localhost:5000/worker:${{ github.sha }} localhost:5000/worker:latest
          docker tag localhost:5000/frontend:${{ github.sha }} localhost:5000/frontend:latest

      - name: Push images
        run: |
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/frontend:${{ github.sha }}

  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "localhost:5000/api:${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL"
          exit-code: "1"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 15

      - name: Submit job
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r '.job_id')
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll job
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r '.status')
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy simulation
        run: |
          echo "Starting rolling update..."
          docker compose up -d --build

          sleep 60

          echo "Checking health..."
          docker ps