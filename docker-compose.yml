services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app-network
    expose:
      - "6379"

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      QUEUE_NAME: ${QUEUE_NAME:-jobs}
    expose:
      - "8000"
    networks:
      - app-network

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s

  worker:
    build: ./worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      QUEUE_NAME: ${QUEUE_NAME}
    networks:
      - app-network

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    healthcheck:
      test: ["CMD", "pgrep", "-f", "worker.py"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: ${API_URL}
    ports:
      - "3000:3000"
    networks:
      - app-network

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M


    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  app-network:
    driver: bridge